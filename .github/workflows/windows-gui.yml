name: Build Windows GUI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows-installer:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri

      - name: Install frontend dependencies
        working-directory: gui
        run: npm ci

      - name: Build NSIS and MSI installers
        working-directory: gui
        run: npm run tauri build

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: latale-tools-windows-x64
          if-no-files-found: error
          path: |
            gui/src-tauri/target/release/latale-tools-gui.exe
            gui/src-tauri/target/release/bundle/nsis/*.exe
            gui/src-tauri/target/release/bundle/msi/*.msi
