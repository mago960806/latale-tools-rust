name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows-installer:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri

      - name: Install frontend dependencies
        working-directory: gui
        run: npm ci

      - name: Build CLI tools
        run: |
          cargo build --release --locked `
            --bin latale-spf `
            --bin latale-ldt `
            --bin latale-stg

      - name: Build NSIS and MSI installers
        working-directory: gui
        run: npm run tauri build

      - name: Stage release files
        shell: pwsh
        run: |
          $version = (Get-Content gui/package.json | ConvertFrom-Json).version
          New-Item -ItemType Directory -Force release-artifacts | Out-Null

          Copy-Item `
            gui/src-tauri/target/release/latale-tools.exe `
            "release-artifacts/latale-tools-$version-windows-x64.exe"
          Copy-Item `
            target/release/latale-spf.exe `
            "release-artifacts/latale-spf-$version-windows-x64.exe"
          Copy-Item `
            target/release/latale-ldt.exe `
            "release-artifacts/latale-ldt-$version-windows-x64.exe"
          Copy-Item `
            target/release/latale-stg.exe `
            "release-artifacts/latale-stg-$version-windows-x64.exe"

          $nsis = Get-ChildItem gui/src-tauri/target/release/bundle/nsis/*.exe |
            Select-Object -First 1
          $msi = Get-ChildItem gui/src-tauri/target/release/bundle/msi/*.msi |
            Select-Object -First 1
          if (-not $nsis -or -not $msi) {
            throw "NSIS or MSI installer was not generated"
          }

          Copy-Item $nsis.FullName `
            "release-artifacts/latale-tools-$version-windows-x64-setup.exe"
          Copy-Item $msi.FullName `
            "release-artifacts/latale-tools-$version-windows-x64.msi"
          Copy-Item docs/latale-spf-guide.md release-artifacts/
          Copy-Item docs/latale-ldt-guide.md release-artifacts/
          Copy-Item docs/latale-stg-guide.md release-artifacts/

      - name: Upload Windows release
        uses: actions/upload-artifact@v7
        with:
          name: latale-tools-windows-x64
          if-no-files-found: error
          path: release-artifacts/*
